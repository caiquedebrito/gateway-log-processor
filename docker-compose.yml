services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gateway_logs_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      RUN_SEEDERS: true
    depends_on:
      - mysql

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gateway_logs_queue
    working_dir: /var/www/html
    command: php artisan queue:work --queue=logs,reports --sleep=1 --tries=3
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: gateway_logs_mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:alpine
    container_name: gateway_logs_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  mysql_data: